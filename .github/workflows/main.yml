# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Flutter CI/CD Pipeline

on:
  push:
    branches:  
    #  - refactor/core-files-and-firebase-security
     - development
     - staging
     - master
  pull_request:
    branches:  
     - development

env:
  API_BASE_URL: ${{ secrets.API_BASE_URL }}

jobs:
  testing: # name for job
    name: 🧪 Run Unit & Widget Tests
    runs-on: ubuntu-latest # get the ubuntu to run flow

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # get code form the "development" branch

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'  # Change to your Flutter version
          cache: true

      - name: Install Dependencies
        run: flutter pub get
      - name: 🛠️ Create .env from secrets
        run: |
          echo "API_BASE_URL=$API_BASE_URL" >> .env

      - name: Generate *.g.dart files
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Tests
        run: flutter test

  build:
    name: 🛠️ Build APK
    needs: testing # wait first job then run this jobs
    runs-on: macOS-latest # get the macos to run flow
    permissions:
      contents: write  # لإنشاء الإصدارات والعلامات (Tags)
      pull-requests: write  # للتعليق على طلبات السحب
      id-token: write  # قد يكون مطلوباً لبعض التكاملات
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4 # get code form the "development" branch

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'  # Change to your Flutter version
          cache: true

      - name: Install Dependencies
        run: flutter pub get     

      - name: 🛠️ Create .env from secrets
        run: |
          echo "API_BASE_URL=$API_BASE_URL" >> .env

      - name: 🔐 Decode Firebase config files
        run: ./scripts/decode_firebase_files.sh
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          GOOGLESERVICE_INFO_PLIST_BASE64: ${{ secrets.GOOGLESERVICE_INFO_PLIST_BASE64 }}
                    
      - name: Generate *.g.dart files
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build release APK
        run: flutter build apk --release

  #    - name: Build IPA
  #      run: flutter build ipa --export-options-plist=ExportOptions.plist

  #    - name: Compress Archives and IPAs
  #      run: |
  #        cd build
  #        tar -czf ios_build.tar.gz ios  
       

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
        #   build/ios/ipa/*.ipa


      - name: Extract version from pubspec.yaml
        id: extract_version
        run: |
          version=$(grep '^version: ' pubspec.yaml | cut -d ' ' -f 2 | tr -d '\r')
          echo "VERSION=$version" >> $GITHUB_ENV   
          
      - name: Check if Tag Exists
        id: check_tag
        run: |
          if git rev-parse "v${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
          fi      

          
      - name: Modify Tag
        if: env.TAG_EXISTS == 'true'
        id: modify_tag
        run: |
          new_version="${{ env.VERSION }}-build-${{ github.run_number }}"
          echo "VERSION=$new_version" >> $GITHUB_ENV

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
        #  artifacts: "build/app/outputs/flutter-apk/app-release.apk,build/app/outputs/bundle/release/app-release.aab,build/ios_build.tar.gz"
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true  # السماح بتحديث الإصدار الموجود
          draft: false
          prerelease: false
          body: "Automatic release for build ${{ github.run_number }}"

      
      - name: 📝 Comment on PR
        if: github.event_name == 'pull_request' 
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `
                ✅ *APK build succeeded!*
                🔢 *Run Number:* #${{ github.run_number }}
                📥 [Download APK](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `
            });          

      - name: 📣 Notify Slack - Build Success
        if: success()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook-type: incoming-webhook
          payload: |
              {
                "username": "GitHub CI/CD",
                "icon_url": "https://github.com/rtCamp.png?size=48",
                "channel": "#vibe-in",
                "attachments": [
                  {
                    "color": "good",
                    "title": "✅ Build Succeeded",
                    "text": "*Build succeeded!* :tada:\n\n🔧 *Repo:* `${{ github.repository }}`\n🌿 *Branch:* `${{ github.ref_name }}`\n📦 *Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                  }
                ]
              }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}           
            
      - name: 📣 Notify Slack - Build Failed
        if: failure()
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook-type: incoming-webhook
          payload: |
            {
              "username": "GitHub CI/CD",
              "icon_url": "https://github.com/rtCamp.png?size=48",
              "channel": "#vibe-in",
              "attachments": [
                {
                  "color": "danger",
                  "title": "❌ Build Failed",
                  "text": "*Build failed!* :x:\n\n🔧 *Repo:* `${{ github.repository }}`\n🌿 *Branch:* `${{ github.ref_name }}`\n📦 *Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
            

  deploy:
      name: 🚀 Deploy to Firebase App Distribution
      needs: build
      runs-on: ubuntu-latest
      if: github.ref == 'refs/heads/staging'
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
  
        - name: Download APK artifact
          uses: actions/download-artifact@v4
          with:
            name: release-apk
  
        - name: Deploy to Firebase App Distribution
          uses: wzieba/Firebase-Distribution-Github-Action@v1
          with:
            appId: ${{ secrets.FIREBASE_ANDROID_APP_ID }}
            serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
            groups: testers
            file: app-release.apk
            releaseNotes: "New CI/CD build from GitHub Actions"

        - name: 📣 Notify Slack - Deploy Success
          if: success()
          uses: slackapi/slack-github-action@v2.0.0
          with:
            webhook-type: incoming-webhook
            payload: |
                {
                  "username": "GitHub CI/CD",
                  "icon_url": "https://github.com/rtCamp.png?size=48",
                  "channel": "#vibe-in",
                  "attachments": [
                    {
                      "color": "good",
                      "title": "✅ Deploy Succeeded",
                      "text": "*Deployment succeeded!* :tada:\n\n🔧 *Repo:* `${{ github.repository }}`\n🌿 *Branch:* `${{ github.ref_name }}`\n📦 *Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                    }
                  ]
                }
          env:
            SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}     
            
        - name: 📣 Notify Slack - Deploy Failed
          if: failure()
          uses: slackapi/slack-github-action@v2.0.0
          with:
            webhook-type: incoming-webhook
            payload: |
              {
                "username": "GitHub CI/CD",
                "icon_url": "https://github.com/rtCamp.png?size=48",
                "channel": "#vibe-in",
                "attachments": [
                  {
                    "color": "danger",
                    "title": "❌ Deploy Failed",
                    "text": "*Deployment failed!* :x:\n\n🔧 *Repo:* `${{ github.repository }}`\n🌿 *Branch:* `${{ github.ref_name }}`\n📦 *Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}>"
                  }
                ]
              }
          env:
            SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
            




            

